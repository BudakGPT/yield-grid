name: CI

# Quality gate only. Deployment is handled by Vercel (frontend) and Railway (backend + sidecar).
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which components changed so we only run the jobs that matter
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      sidecar: ${{ steps.filter.outputs.sidecar }}
      contract: ${{ steps.filter.outputs.contract }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            sidecar:
              - 'settlement-sidecar/**'
              - '.github/workflows/ci.yml'
            contract:
              - 'contract/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'

  backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '23'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build and test
        run: |
          chmod +x ./gradlew
          ./gradlew build --no-daemon

  sidecar:
    needs: changes
    if: ${{ needs.changes.outputs.sidecar == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: settlement-sidecar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: settlement-sidecar/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npm run check
      - name: Test
        run: npm test

  contract:
    needs: changes
    if: ${{ needs.changes.outputs.contract == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contract
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: contract
      - name: Test
        run: cargo test --locked

  frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # Build itself is covered by Vercel (needs NEXT_PUBLIC_* env); here we gate on lint
      - name: Lint
        run: npm run lint
