server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/yieldgrid}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

app:
  jwt:
    secret: ${JWT_SECRET:ZmFybWxlZGdlci15aWVsZGdyaWQtZGV2LXNlY3JldC1rZXktMzItYnl0ZXMtbWluaW11bQ==}
    expiration: ${JWT_EXPIRATION:3600}
