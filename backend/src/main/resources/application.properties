spring.application.name=yieldgrid-backend
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]
server.port=${PORT:8083}

spring.datasource.url=${DB_URL:jdbc:h2:mem:yieldgrid;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.servlet.multipart.max-file-size=12MB
spring.servlet.multipart.max-request-size=12MB

app.jwt.secret=${JWT_SECRET:ZmFybWxlZGdlci15aWVsZGdyaWQtZGV2LXNlY3JldC1rZXktMzItYnl0ZXMtbWluaW11bQ==}
app.jwt.expiration=${JWT_EXPIRATION:3600}
app.auth.supabase.url=${SUPABASE_URL:}
app.auth.supabase.publishable-key=${SUPABASE_PUBLISHABLE_KEY:${SUPABASE_ANON_KEY:}}
app.auth.supabase.timeout=${SUPABASE_AUTH_TIMEOUT:20s}
app.integration.sidecar-enabled=${SIDECAR_ENABLED:false}
app.integration.sidecar-url=${SIDECAR_URL:http://localhost:8090}
app.integration.sidecar-token=${SIDECAR_TOKEN:dev-sidecar-token}
app.integration.key-encryption-secret=${KEY_ENCRYPTION_SECRET:eWllbGRncmlkLWRldi1lbmNyeXB0aW9uLXNlY3JldA==}
app.integration.frontend-origin=${FRONTEND_ORIGIN:http://localhost:3000,http://127.0.0.1:3000}
app.grading.mode=${GRADING_MODE:openrouter}
app.demo.enabled=${DEMO_ENABLED:false}
app.grading.openrouter.api-key=${OPENROUTER_API_KEY:}
app.grading.openrouter.model=${OPENROUTER_MODEL:google/gemma-4-26b-a4b-it:free}
app.grading.openrouter.base-url=${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
app.grading.openrouter.timeout=${OPENROUTER_TIMEOUT:60s}
app.grading.openrouter.max-tokens=${OPENROUTER_MAX_TOKENS:700}
app.grading.openrouter.app-url=${OPENROUTER_APP_URL:http://localhost:3000}
app.grading.openrouter.app-name=${OPENROUTER_APP_NAME:YieldGrid}
app.storage.upload-dir=${UPLOAD_DIR:uploads}
app.storage.pinata.jwt=${PINATA_JWT:}
app.storage.pinata.base-url=${PINATA_BASE_URL:https://api.pinata.cloud}
app.storage.pinata.gateway-url=${PINATA_GATEWAY_URL:https://gateway.pinata.cloud/ipfs}
app.storage.pinata.timeout=${PINATA_TIMEOUT:30s}
