spring.application.name=yieldgrid-backend
server.port=${PORT:8083}

spring.datasource.url=${DB_URL:jdbc:h2:mem:yieldgrid;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.servlet.multipart.max-file-size=12MB
spring.servlet.multipart.max-request-size=12MB

app.jwt.secret=${JWT_SECRET:ZmFybWxlZGdlci15aWVsZGdyaWQtZGV2LXNlY3JldC1rZXktMzItYnl0ZXMtbWluaW11bQ==}
app.jwt.expiration=${JWT_EXPIRATION:3600}
app.integration.sidecar-enabled=${SIDECAR_ENABLED:false}
app.integration.sidecar-url=${SIDECAR_URL:http://localhost:8090}
app.integration.sidecar-token=${SIDECAR_TOKEN:dev-sidecar-token}
app.integration.key-encryption-secret=${KEY_ENCRYPTION_SECRET:eWllbGRncmlkLWRldi1lbmNyeXB0aW9uLXNlY3JldA==}
app.integration.frontend-origin=${FRONTEND_ORIGIN:http://localhost:3000}
app.grading.mode=${GRADING_MODE:rehearsal}
app.storage.upload-dir=${UPLOAD_DIR:uploads}
